<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Listings — Rafeeq</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <link rel="manifest" href="/static/manifest.json"/>
  <meta name="theme-color" content="#2d6a4f"/>
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png"/>
  <script src="/static/lang.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #f8f7f4; --surface: #fff; --border: #e8e4dc; --accent: #2d6a4f; --accent2: #e76f51; --text: #1a1a2e; --muted: #6b7280; --shadow: 0 2px 16px rgba(0,0,0,0.08); }
    body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); }

    /* NAVBAR */
    .navbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; height: 68px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
    .logo { font-size: 1.6rem; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; text-decoration: none; }
    .logo span { color: var(--accent2); }
    .nav-links { display: flex; gap: 10px; align-items: center; }
    .lang-toggle { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-family: 'Tajawal', sans-serif; font-size: 0.85rem; cursor: pointer; }
    .lang-toggle:hover { border-color: var(--accent); }

    /* PROFILE DROPDOWN */
    .profile-dropdown { position: relative; }
    .profile-btn { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; font-family: 'Tajawal', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; color: var(--text); transition: all 0.2s; }
    .profile-btn:hover { border-color: var(--accent); background: #f0faf4; }
    .dropdown-menu { display: none; position: absolute; top: calc(100% + 8px); right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); min-width: 180px; overflow: hidden; z-index: 200; }
    .dropdown-menu.open { display: block; }
    .dropdown-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; font-size: 14px; font-weight: 500; color: var(--text); cursor: pointer; transition: background 0.15s; text-decoration: none; border: none; background: none; width: 100%; font-family: 'Tajawal', sans-serif; }
    .dropdown-item:hover { background: var(--bg); }
    .dropdown-item.active { color: var(--accent); font-weight: 700; background: #f0faf4; }
    .dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }
    .dropdown-item.danger { color: var(--accent2); }
    .dropdown-item.danger:hover { background: #fff5f0; }

    /* PAGE */
    .container { max-width: 860px; margin: 0 auto; padding: 40px 24px 64px; }
    .page-header { margin-bottom: 32px; }
    .page-header h1 { font-size: 26px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .page-header p { font-size: 15px; color: var(--muted); }

    /* LISTING CARD */
    .listing-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; margin-bottom: 16px; display: flex; gap: 20px; align-items: flex-start; transition: box-shadow 0.2s; }
    .listing-card:hover { box-shadow: var(--shadow); }
    .listing-img { width: 100px; height: 76px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: #e8f4ea; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .listing-img img { width: 100px; height: 76px; border-radius: 10px; object-fit: cover; }
    .listing-body { flex: 1; min-width: 0; }
    .listing-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
    .listing-title { font-size: 16px; font-weight: 700; color: var(--text); text-decoration: none; }
    .listing-title:hover { color: var(--accent); }
    .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .status-approved { background: #e8f5e9; color: #2d6a4f; }
    .status-pending  { background: #fff3e0; color: #e65100; }
    .status-rejected { background: #fce4ec; color: #880e4f; }
    .listing-meta { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .listing-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-view   { padding: 7px 16px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; transition: border-color 0.2s; }
    .btn-view:hover { border-color: var(--accent); color: var(--accent); }
    .btn-edit   { padding: 7px 16px; background: #e3f2fd; color: #1565c0; border: none; border-radius: 8px; font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-edit:hover { background: #bbdefb; }
    .btn-delete { padding: 7px 16px; background: #fce4ec; color: #880e4f; border: none; border-radius: 8px; font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-delete:hover { background: #f8bbd0; }

    /* EMPTY STATE */
    .empty { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .empty h2 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .empty p { font-size: 15px; margin-bottom: 24px; }
    .btn-primary { padding: 12px 28px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: 'Tajawal', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.85; }

    .loading { text-align: center; padding: 80px 0; color: var(--muted); font-size: 15px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* EDIT MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 300; align-items: center; justify-content: center; padding: 24px; overflow-y: auto; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 20px; padding: 32px; width: 100%; max-width: 520px; margin: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-header h2 { font-size: 20px; font-weight: 800; }
    .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #aaa; }
    .field-label { font-size: 12px; font-weight: 700; color: #888; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field-input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Tajawal', sans-serif; font-size: 15px; margin-bottom: 14px; outline: none; }
    .field-input:focus { border-color: var(--accent); }
    .field-textarea { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Tajawal', sans-serif; font-size: 15px; margin-bottom: 14px; outline: none; resize: vertical; height: 90px; }
    .field-textarea:focus { border-color: var(--accent); }
    .field-select { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Tajawal', sans-serif; font-size: 15px; margin-bottom: 14px; outline: none; background: #fff; }
    .field-select:focus { border-color: var(--accent); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .tags-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .tag-label { display: flex; align-items: center; gap: 6px; background: #f5f5f0; padding: 7px 12px; border-radius: 20px; cursor: pointer; font-size: 14px; }
    .btn-save { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: 'Tajawal', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .btn-save:hover { opacity: 0.85; }
    .modal-error { color: var(--accent2); font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="logo">&#x631;&#x641;&#x64A;&#x642; <span>Rafeeq</span></a>
  <div class="nav-links">
    <button class="lang-toggle" onclick="toggleLang()"></button>
    <div class="profile-dropdown" id="profileDropdown">
      <button class="profile-btn" onclick="toggleDropdown()">
        <span>👤</span> <span id="profileName">...</span> <span>▾</span>
      </button>
      <div class="dropdown-menu" id="dropdownMenu">
        <a href="/my-listings" class="dropdown-item active">📋 My Listings</a>
        <a href="/messages" class="dropdown-item">💬 Messages</a>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item danger" onclick="logout()">🚪 Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>📋 My Listings</h1>
    <p>Manage your posted apartments</p>
  </div>

  <div id="loadingState" class="loading">
    <div class="spinner"></div>
    Loading your listings...
  </div>
  <div id="listingsContainer" style="display:none;"></div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h2>✏️ Edit Listing</h2>
      <button class="modal-close" onclick="closeEdit()">&#x2715;</button>
    </div>
    <label class="field-label">Title *</label>
    <input id="editTitle" class="field-input" type="text" placeholder="e.g. Room in Sweifieh"/>
    <label class="field-label">Description</label>
    <textarea id="editDescription" class="field-textarea" placeholder="Describe your apartment..."></textarea>
    <div class="grid-2">
      <div>
        <label class="field-label">Type *</label>
        <select id="editType" class="field-select">
          <option value="shared">Shared</option>
          <option value="private">Private</option>
        </select>
      </div>
      <div>
        <label class="field-label">Gender Preference *</label>
        <select id="editGender" class="field-select">
          <option value="male">Males Only</option>
          <option value="female">Females Only</option>
          <option value="any">Any Gender</option>
        </select>
      </div>
    </div>
    <div class="grid-2">
      <div>
        <label class="field-label">Monthly Rent (JD) *</label>
        <input id="editRent" class="field-input" type="number" placeholder="e.g. 150"/>
      </div>
      <div>
        <label class="field-label">Number of Rooms</label>
        <input id="editRooms" class="field-input" type="number" placeholder="e.g. 3"/>
      </div>
    </div>
    <label class="field-label">Area *</label>
    <select id="editArea" class="field-select">
      <option value="Sweifieh">Sweifieh</option>
      <option value="Abdoun">Abdoun</option>
      <option value="Shmeisani">Shmeisani</option>
      <option value="Jubeiha">Jubeiha</option>
      <option value="Tla Al Ali">Tla Al Ali</option>
      <option value="Khalda">Khalda</option>
      <option value="Gardens">Gardens</option>
      <option value="Medina Munawara St">Medina Munawara St</option>
      <option value="University of Jordan Area">University of Jordan Area</option>
      <option value="Mecca St">Mecca St</option>
      <option value="Downtown">Downtown</option>
      <option value="Jabal Amman">Jabal Amman</option>
      <option value="Other">Other</option>
    </select>
    <label class="field-label">Lifestyle Tags</label>
    <div class="tags-wrap">
      <label class="tag-label"><input type="checkbox" class="edit-tag" value="Doesn't Smoke"> Doesn't Smoke</label>
      <label class="tag-label"><input type="checkbox" class="edit-tag" value="Prays"> Prays</label>
      <label class="tag-label"><input type="checkbox" class="edit-tag" value="Quiet Lifestyle"> Quiet Lifestyle</label>
      <label class="tag-label"><input type="checkbox" class="edit-tag" value="Students Only"> Students Only</label>
      <label class="tag-label"><input type="checkbox" class="edit-tag" value="Doesn't Bring Guests"> Doesn't Bring Guests</label>
      <label class="tag-label"><input type="checkbox" class="edit-tag" value="Pet Friendly"> Pet Friendly</label>
    </div>
    <button class="btn-save" onclick="saveEdit()">Save Changes</button>
    <p class="modal-error" id="editError"></p>
  </div>
</div>

<script>
  let currentUser = null;
  let editingId   = null;

  // ── DROPDOWN ──────────────────────────────────────────────────
  function toggleDropdown() {
    document.getElementById('dropdownMenu').classList.toggle('open');
  }
  document.addEventListener('click', (e) => {
    if (!document.getElementById('profileDropdown').contains(e.target)) {
      document.getElementById('dropdownMenu').classList.remove('open');
    }
  });

  // ── AUTH ──────────────────────────────────────────────────────
  async function checkAuth() {
    try {
      const res = await fetch('/api/me');
      if (!res.ok) { window.location.href = '/'; return; }
      currentUser = await res.json();
      document.getElementById('profileName').textContent = currentUser.name.split(' ')[0];
    } catch (e) { window.location.href = '/'; }
  }

  async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/';
  }

  // ── LOAD MY LISTINGS ──────────────────────────────────────────
  async function loadMyListings() {
    try {
      const res      = await fetch('/api/my-listings');
      const listings = await res.json();
      document.getElementById('loadingState').style.display = 'none';
      const container = document.getElementById('listingsContainer');
      container.style.display = 'block';

      if (!listings.length) {
        container.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🏠</div>
            <h2>No listings yet</h2>
            <p>You haven't posted any apartments. Post your first listing and find a roommate!</p>
            <a href="/" class="btn-primary">+ Post a Listing</a>
          </div>`;
        return;
      }

      container.innerHTML = listings.map(l => {
        const photo = (l.photos && l.photos.length > 0) ? l.photos[0] : null;
        const imgHTML = photo
          ? `<img src="${photo.startsWith('http') ? photo : '/' + photo}" alt="${l.title}"/>`
          : '🏠';
        const statusClass = `status-${l.status}`;
        const statusText  = l.status === 'approved' ? '✅ Live' : l.status === 'pending' ? '⏳ Pending Review' : '❌ Rejected';
        return `
          <div class="listing-card" id="card-${l.id}">
            <div class="listing-img">${imgHTML}</div>
            <div class="listing-body">
              <div class="listing-top">
                <a href="/listing/${l.id}" class="listing-title">${l.title}</a>
                <span class="status-badge ${statusClass}">${statusText}</span>
              </div>
              <div class="listing-meta">
                📍 ${l.area} &nbsp;·&nbsp; ${l.rent} JD/month &nbsp;·&nbsp; ${l.apartment_type}
                &nbsp;·&nbsp; ${l.created_at ? l.created_at.substring(0,10) : ''}
              </div>
              <div class="listing-actions">
                <a href="/listing/${l.id}" class="btn-view">👁 View</a>
                <button class="btn-edit" onclick="openEdit(${JSON.stringify(l).replace(/"/g, '&quot;')})">✏️ Edit</button>
                <button class="btn-delete" onclick="deleteListing(${l.id})">🗑 Delete</button>
              </div>
            </div>
          </div>`;
      }).join('');
    } catch (e) {
      document.getElementById('loadingState').innerHTML = '<p style="color:#e76f51;">Failed to load listings.</p>';
    }
  }

  // ── DELETE ────────────────────────────────────────────────────
  async function deleteListing(id) {
    if (!confirm('Are you sure you want to delete this listing? This cannot be undone.')) return;
    try {
      const res = await fetch(`/api/listings/${id}/delete-own`, { method: 'POST' });
      if (res.ok) {
        document.getElementById(`card-${id}`)?.remove();
        // If no cards left, reload to show empty state
        if (!document.querySelector('.listing-card')) loadMyListings();
      } else {
        const data = await res.json();
        alert(data.error || 'Failed to delete listing.');
      }
    } catch (e) { alert('Something went wrong.'); }
  }

  // ── EDIT ──────────────────────────────────────────────────────
  function openEdit(listing) {
    editingId = listing.id;
    document.getElementById('editTitle').value       = listing.title || '';
    document.getElementById('editDescription').value = listing.description || '';
    document.getElementById('editType').value        = listing.apartment_type || 'shared';
    document.getElementById('editGender').value      = listing.gender_preference || 'any';
    document.getElementById('editRent').value        = listing.rent || '';
    document.getElementById('editRooms').value       = listing.rooms || '';
    document.getElementById('editArea').value        = listing.area || '';
    document.getElementById('editError').textContent = '';

    // Set tags
    const currentTags = listing.tags || [];
    document.querySelectorAll('.edit-tag').forEach(cb => {
      cb.checked = currentTags.includes(cb.value);
    });

    document.getElementById('editModal').classList.add('open');
  }

  function closeEdit() {
    document.getElementById('editModal').classList.remove('open');
    editingId = null;
  }

  async function saveEdit() {
    const title             = document.getElementById('editTitle').value.trim();
    const description       = document.getElementById('editDescription').value.trim();
    const apartment_type    = document.getElementById('editType').value;
    const gender_preference = document.getElementById('editGender').value;
    const rent              = document.getElementById('editRent').value;
    const rooms             = document.getElementById('editRooms').value;
    const area              = document.getElementById('editArea').value;
    const tags              = Array.from(document.querySelectorAll('.edit-tag:checked')).map(cb => cb.value);

    if (!title || !apartment_type || !gender_preference || !rent || !area) {
      document.getElementById('editError').textContent = 'Please fill in all required fields.'; return;
    }

    try {
      const res  = await fetch(`/api/listings/${editingId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description, apartment_type, gender_preference, rent: parseFloat(rent), rooms: parseInt(rooms) || null, area, tags })
      });
      const data = await res.json();
      if (res.ok) {
        closeEdit();
        loadMyListings();
      } else {
        document.getElementById('editError').textContent = data.error || 'Failed to save changes.';
      }
    } catch (e) { document.getElementById('editError').textContent = 'Something went wrong.'; }
  }

  // ── INIT ──────────────────────────────────────────────────────
  checkAuth().then(() => loadMyListings());
</script>
<script>
  if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js').catch(()=>{}); }); }
</script>
</body>
</html>
