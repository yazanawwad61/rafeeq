<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages — Rafeeq</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="manifest" href="/static/manifest.json"/>
<meta name="theme-color" content="#2d6a4f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Rafeeq"/>
<link rel="apple-touch-icon" href="/static/icons/icon-192.png"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: #f5f5f0;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ── */
    .navbar {
      background: #fff;
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e8e4dc;
      flex-shrink: 0;
    }
    .navbar-logo {
      font-size: 22px;
      font-weight: 700;
      color: #2d6a4f;
      text-decoration: none;
    }
    .navbar-logo span { color: #e76f51; }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #2d6a4f;
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
      padding: 8px 16px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .back-btn:hover { background: #f0faf4; }

    /* ── LAYOUT ── */
    .chat-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
      padding: 24px;
      gap: 20px;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 320px;
      flex-shrink: 0;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e8e4dc;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #f0ede8;
      font-size: 18px;
      font-weight: 700;
    }
    .conversation-list {
      flex: 1;
      overflow-y: auto;
    }
    .conversation-item {
      padding: 16px 20px;
      border-bottom: 1px solid #f5f5f0;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .conversation-item:hover { background: #f9f9f7; }
    .conversation-item.active { background: #f0faf4; }
    .conv-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #2d6a4f;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conv-listing {
      font-size: 12px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conv-last {
      font-size: 12px;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 3px;
    }
    .conv-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .unread-badge {
      background: #2d6a4f;
      color: #fff;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: #aaa;
      font-size: 14px;
    }
    .empty-state div { font-size: 32px; margin-bottom: 10px; }

    /* ── CHAT PANEL ── */
    .chat-panel {
      flex: 1;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e8e4dc;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid #f0ede8;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #2d6a4f;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
    }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-weight: 700; font-size: 15px; }
    .chat-header-listing { font-size: 12px; color: #888; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .message-bubble {
      display: flex;
      flex-direction: column;
      margin-bottom: 12px;
    }
    .message-bubble.me { align-items: flex-end; }
    .message-bubble.them { align-items: flex-start; }
    .bubble-sender {
      font-size: 12px;
      color: #888;
      margin-bottom: 3px;
    }
    .bubble-text {
      max-width: 70%;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.5;
      border-radius: 16px;
    }
    .bubble-text.me {
      background: #2d6a4f;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble-text.them {
      background: #f0ede8;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }
    .bubble-time {
      font-size: 11px;
      color: #bbb;
      margin-top: 3px;
    }
    .chat-input-area {
      padding: 16px 20px;
      border-top: 1px solid #f0ede8;
      display: flex;
      gap: 10px;
    }
    .chat-input-area input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #e8e4dc;
      border-radius: 24px;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      outline: none;
    }
    .chat-input-area input:focus { border-color: #2d6a4f; }
    .send-btn {
      background: #2d6a4f;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .send-btn:hover { background: #1b4332; }
    .no-chat-selected {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #aaa;
    }
    .no-chat-selected div:first-child { font-size: 48px; }
    .no-chat-selected div:last-child { font-size: 15px; }

    /* ── NOT LOGGED IN ── */
    .auth-wall {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: #888;
    }
    .auth-wall div:first-child { font-size: 48px; }
    .auth-wall h2 { font-size: 20px; color: #1a1a2e; }
    .auth-wall a {
      background: #2d6a4f;
      color: #fff;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="/" class="back-btn">← Back to listings</a>
  <a href="/" class="navbar-logo">Rafeeq <span>رفيق</span></a>
</nav>

<!-- CONTENT -->
<div id="authWall" class="auth-wall" style="display:none;">
  <div>🔒</div>
  <h2>You need to be logged in</h2>
  <a href="/">Go to homepage and log in</a>
</div>

<div id="chatLayout" class="chat-layout" style="display:none;">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">💬 Messages</div>
    <div class="conversation-list" id="conversationList">
      <div class="empty-state">
        <div>💬</div>
        Loading conversations...
      </div>
    </div>
  </div>

  <!-- CHAT PANEL -->
  <div class="chat-panel" id="chatPanel">
    <div class="no-chat-selected">
      <div>👈</div>
      <div>Select a conversation</div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<script>
  let currentUser   = null;
  let activeConv    = null;
  let socket        = null;

  // ── INIT ──────────────────────────────────────────────────────
  async function init() {
    try {
      const res = await fetch('/api/me');
      if (!res.ok) {
        document.getElementById('authWall').style.display = 'flex';
        return;
      }
      currentUser = await res.json();
      document.getElementById('chatLayout').style.display = 'flex';
      loadConversations();
      initSocket();
    } catch (e) {
      document.getElementById('authWall').style.display = 'flex';
    }
  }

  // ── LOAD CONVERSATIONS ────────────────────────────────────────
  async function loadConversations() {
    try {
      const res   = await fetch('/api/conversations');
      const convs = await res.json();
      const list  = document.getElementById('conversationList');

      if (!convs.length) {
        list.innerHTML = `
          <div class="empty-state">
            <div>💬</div>
            No conversations yet.<br>Contact a listing owner to start chatting.
          </div>`;
        return;
      }

      list.innerHTML = convs.map(c => `
        <div class="conversation-item" onclick="openConversation(${c.listing_id}, ${c.other_user_id}, '${c.other_user_name}', '${c.listing_title}')"
             id="conv-${c.listing_id}-${c.other_user_id}">
          <div class="conv-avatar">${c.other_user_name[0].toUpperCase()}</div>
          <div class="conv-info">
            <div class="conv-name">${c.other_user_name}</div>
            <div class="conv-listing">${c.listing_title}</div>
            <div class="conv-last">${c.last_message}</div>
          </div>
          <div class="conv-meta">
            ${c.unread_count > 0 ? `<div class="unread-badge">${c.unread_count}</div>` : ''}
          </div>
        </div>
      `).join('');

    } catch (e) {
      console.error('Load conversations error:', e);
    }
  }

  // ── OPEN CONVERSATION ─────────────────────────────────────────
  async function openConversation(listingId, otherUserId, otherName, listingTitle) {
    // Highlight active conversation
    document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
    const el = document.getElementById(`conv-${listingId}-${otherUserId}`);
    if (el) el.classList.add('active');

    activeConv = { listingId, otherUserId, otherName, listingTitle };

    // Join SocketIO room
    if (socket) {
      socket.emit('join_chat', { listing_id: listingId, other_user_id: otherUserId });
    }

    // Render chat panel
    const panel = document.getElementById('chatPanel');
    panel.innerHTML = `
      <div class="chat-header">
        <div class="chat-header-avatar">${otherName[0].toUpperCase()}</div>
        <div class="chat-header-info">
          <div class="chat-header-name">${otherName}</div>
          <div class="chat-header-listing">${listingTitle}</div>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <input id="chatInput" type="text" placeholder="Type a message..."
               onkeydown="if(event.key==='Enter') sendMessage()"/>
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    `;

    // Load history
    try {
      const res      = await fetch(`/api/messages/${listingId}/${otherUserId}`);
      const messages = await res.json();
      const box      = document.getElementById('chatMessages');
      box.innerHTML  = '';
      messages.forEach(m => appendMessage(m.sender_id, m.sender_name, m.message, m.created_at));
      box.scrollTop = box.scrollHeight;
    } catch (e) {}
  }

  // ── APPEND MESSAGE ────────────────────────────────────────────
  function appendMessage(senderId, senderName, message, time) {
    const box  = document.getElementById('chatMessages');
    if (!box) return;
    const isMe = senderId === currentUser.id;
    const div  = document.createElement('div');
    div.className = `message-bubble ${isMe ? 'me' : 'them'}`;
    div.innerHTML = `
      ${!isMe ? `<div class="bubble-sender">${senderName}</div>` : ''}
      <div class="bubble-text ${isMe ? 'me' : 'them'}">${message}</div>
      <div class="bubble-time">${time}</div>
    `;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  // ── SEND MESSAGE ──────────────────────────────────────────────
  function sendMessage() {
    if (!activeConv || !socket) return;
    const input   = document.getElementById('chatInput');
    const message = input.value.trim();
    if (!message) return;

    input.value = '';
    socket.emit('send_message', {
      receiver_id: activeConv.otherUserId,
      listing_id:  activeConv.listingId,
      message:     message
    });
  }

  // ── SOCKETIO ──────────────────────────────────────────────────
  function initSocket() {
    socket = io();
    socket.on('new_message', (data) => {
      if (activeConv &&
          data.listing_id === activeConv.listingId &&
          (data.sender_id === activeConv.otherUserId || data.sender_id === currentUser.id)) {
        appendMessage(data.sender_id, data.sender_name, data.message, data.created_at);
      }
      loadConversations(); // Refresh sidebar
    });
  }

  init();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW registered'))
        .catch(err => console.log('SW error:', err));
    });
  }
</script>
</body>
</html>
